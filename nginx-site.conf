# Upstream configuration - 4 Streamlit instances for 4 cores
upstream streamlit_backend {
    least_conn;  # Load balancing method
    server 127.0.0.1:8501 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8502 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8503 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8504 max_fails=3 fail_timeout=30s;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name evaluation.gobitsnbytes.org;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name evaluation.gobitsnbytes.org;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/evaluation.gobitsnbytes.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evaluation.gobitsnbytes.org/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Streamlit backends
    location / {
        proxy_pass http://streamlit_backend;
        proxy_http_version 1.1;
        
        # WebSocket support (required for Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        
        # Buffering
        proxy_buffering off;
    }

    # WebSocket endpoint
    location /_stcore/stream {
        proxy_pass http://streamlit_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Increase max upload size (for file uploads)
    client_max_body_size 100M;
}
